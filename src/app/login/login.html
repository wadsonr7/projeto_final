<div class="login-wrapper">

    <!-- Lado Esquerdo: Imagem do Veículo -->
    <div class="left-side">
        <img src="img principal casa.jpg" alt="casa" class="car-img">
    </div>

    <!-- Lado Direito: Formulário de Login -->
    <div class="right-side">
        <div class="form-container">

            <!-- Logo Oficial Ford -->
            <img src="img logo casa.webp" alt="casa Logo" class="logo-img">

            <h2 class="welcome-title">Boas-vindas Casas Temporadas</h2>

            <form (ngSubmit)="onLogin()">
                <!-- Campo Usuário / E-mail -->
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" name="usuario" [(ngModel)]="usuario" placeholder="Insira seu e-mail" required>
                </div>

                <!-- Campo Senha -->
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="senha" [(ngModel)]="senha" placeholder="Insira sua senha" required>
                </div>

                <!-- Opção Logar Automaticamente -->
                <div class="remember-row">
                    <label class="remember-label">Logar automaticamente</label>
                    <div class="toggle-switch">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe" class="switch-slider"></label>
                    </div>
                </div>
                 <!-- NOVO: Campo de Aceitação dos Termos --> 
        <div class="terms-row"> 
          <input type="checkbox" id="acceptTerms" name="aceiteTermos" [(ngModel)]="aceiteTermos" required> 
          <label for="acceptTerms" class="terms-label"> 
            Li e aceito os <a href="/termos" target="_blank">Termos de Uso</a> e <a href="/privacidade" target="_blank">Política de Privacidade</a>. 
          </label> 
        </div> 

                <!-- Botão Entrar -->
                <button type="submit" class="btn-submit">Entrar</button>
            </form>

            <p *ngIf="erroMensagem" class="error-text">{{ erroMensagem }}</p>
        </div>
    </div>

</div>
